name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: ai-meeting-minutes-automation
  REGION: asia-northeast1 # Your Cloud Run region (e.g. asia-northeast1, us-central1)

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Enable GCP Services & Ensure Artifact Registry Repository
      run: |
        # Enable APIs (Artifact Registry & Cloud Run)
        gcloud services enable artifactregistry.googleapis.com run.googleapis.com --quiet
        
        # Create Artifact Registry repository if it doesn't exist
        gcloud artifacts repositories describe cloudrun-sources \
          --location=${{ env.REGION }} \
          --quiet || \
        gcloud artifacts repositories create cloudrun-sources \
          --repository-format=docker \
          --location=${{ env.REGION }} \
          --description="Cloud Run deployment images" \
          --quiet

    - name: Configure Docker for gcloud
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: Build and Push Container Image
      run: |
        # Ensure target repository exists or uses default cloudrun-sources
        # We target Google Artifact Registry (AR)
        IMAGE_NAME="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloudrun-sources/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        docker build -t $IMAGE_NAME .
        docker push $IMAGE_NAME

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloudrun-sources/${{ env.SERVICE_NAME }}:${{ github.sha }}
        # This is where the GEMINI_API_KEY from Github Actions secrets gets securely injected as a Cloud Run environment variable.
        env_vars: |
          NODE_ENV=production
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
